services:
  mysql:
    image: mysql:8.0
    platform: linux/amd64
    container_name: smart_catalog_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: smart_catalog
      MYSQL_USER: catalog_user
      MYSQL_PASSWORD: catalog_pass
    ports:
      - "3366:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "catalog_user", "-pcatalog_pass"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: smart_catalog_backend
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: catalog_user
      DB_PASSWORD: catalog_pass
      DB_NAME: smart_catalog
      PORT: 3001
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
